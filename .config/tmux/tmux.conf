# ==========================================
# Pane Navigation (Alt + Arrow Keys)
# ==========================================
# Switch panes without the prefix key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ==========================================
# Window Splitting (Alt + Shift + Arrow Keys)
# ==========================================
# Alt + Shift + Right Arrow for vertical split (side-by-side)
bind -n M-S-Right split-window -h -c "#{pane_current_path}"

# Alt + Shift + Down Arrow for horizontal split (stacked top/bottom)
bind -n M-S-Down split-window -v -c "#{pane_current_path}"

# ==========================================
# Mouse Support (Scrolling, Clicking, Resizing)
# ==========================================
# Enable mouse mode
set -g mouse on

# ==========================================
# Reload Configuration
# ==========================================
# Press Prefix + r to reload the config file
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"

# ==========================================
# Copy Mode Tweaks
# ==========================================
# Use vi keys in copy mode (gives you Vim-like movement)
setw -g mode-keys vi

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Allow tmux to set the system clipboard
set -g set-clipboard on

# ==========================================
# Plugins
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
